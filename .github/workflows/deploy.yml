name: Deploy BUFFS Frontend to Servidor Dedicado

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: |
          npm cache clean --force
          npm ci --legacy-peer-deps

      - name: Criar arquivo .env.production
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.production

      - name: Build do projeto
        run: npm run build

      - name: Criar pacote para deploy
        run: |
          mkdir -p deploy-package
          cp -r .next deploy-package/
          cp -r public deploy-package/
          cp package.json deploy-package/
          cp package-lock.json deploy-package/
          cp next.config.ts deploy-package/
          cp ecosystem.config.js deploy-package/
          cp .env.production deploy-package/
          tar -czf /tmp/deploy.tar.gz -C deploy-package .
          cp /tmp/deploy.tar.gz deploy.tar.gz

      - name: Copiar para PI-53
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          source: 'deploy.tar.gz'
          target: '/root/'

      - name: Deploy e iniciar aplicação
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -e
            cd /root

            echo "─── Parando aplicação anterior ───"
            pm2 stop buffs-frontend 2>/dev/null || true
            pm2 delete buffs-frontend 2>/dev/null || true

            echo "─── Backup do .env.production ───"
            if [ -f buffs-frontend/.env.production ]; then
              cp buffs-frontend/.env.production /tmp/.env.production.backup
            fi

            echo "─── Recriando diretório ───"
            rm -rf buffs-frontend
            mkdir -p buffs-frontend

            echo "─── Extraindo arquivos ───"
            tar -xzf deploy.tar.gz -C buffs-frontend/
            rm deploy.tar.gz

            echo "─── Restaurando .env.production ───"
            if [ -f /tmp/.env.production.backup ]; then
              mv /tmp/.env.production.backup buffs-frontend/.env.production
            fi

            cd buffs-frontend

            echo "─── Verificando arquivos ───"
            [ ! -f .env.production ] && echo "❌ ERRO: .env.production não encontrado" && exit 1
            [ ! -d .next ] && echo "❌ ERRO: .next não encontrado" && exit 1
            [ ! -f next.config.ts ] && echo "❌ ERRO: next.config.ts não encontrado" && exit 1
            echo "✅ Arquivos OK"

            echo "─── Criando diretório de logs ───"
            mkdir -p logs

            echo "─── Instalando dependências de produção ───"
            npm pkg delete scripts.prepare
            npm ci --omit=dev --no-audit --legacy-peer-deps

            echo "─── Iniciando com PM2 ───"
            pm2 start ecosystem.config.js --env production
            pm2 save

            echo "─── Aguardando inicializar ───"
            sleep 10

            echo "─── Health check ───"
            curl -f http://localhost:3000 || (pm2 logs buffs-frontend --lines 30 --nostream && exit 1)

            echo "─── Status PM2 ───"
            pm2 status

            echo ""
            echo "╔══════════════════════════════════════════╗"
            echo "║   FRONTEND DEPLOYADO — Servidor Dedicado ║"
            echo "╠══════════════════════════════════════════╣"
            echo "║  WAN → http://187.95.52.86:9007          ║"
            echo "║  LAN → http://10.37.56.252:3000          ║"
            echo "╚══════════════════════════════════════════╝"
