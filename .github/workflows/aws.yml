name: Deploy BUFFS Frontend to AWS EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Criar arquivo .env.production
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.production

      - name: Build do projeto
        run: npm run build

      - name: Criar pacote para deploy
        run: |
          mkdir -p deploy-package
          cp -r .next deploy-package/
          cp -r public deploy-package/
          cp package.json deploy-package/
          cp package-lock.json deploy-package/
          cp next.config.mjs deploy-package/
          cp ecosystem.config.js deploy-package/
          cp .env.production deploy-package/
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Copiar e extrair no EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: 'deploy.tar.gz'
          target: '/home/${{ secrets.EC2_USER }}/'

      - name: Deploy e iniciar aplicação
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.EC2_USER }}

            # Parar aplicação
            pm2 stop buffs-frontend 2>/dev/null || true
            pm2 delete buffs-frontend 2>/dev/null || true

            # Backup do .env.production se existir
            if [ -f buffs-frontend/.env.production ]; then
              cp buffs-frontend/.env.production /tmp/.env.production.backup
            fi

            # Limpar e recriar diretório
            rm -rf buffs-frontend
            mkdir -p buffs-frontend

            # Extrair arquivos
            tar -xzf deploy.tar.gz -C buffs-frontend/
            rm deploy.tar.gz

            # Restaurar .env.production do backup ou usar o novo
            if [ -f /tmp/.env.production.backup ]; then
              mv /tmp/.env.production.backup buffs-frontend/.env.production
            fi

            cd buffs-frontend

            # Verificar arquivos necessários
            [ ! -f .env.production ] && echo "ERRO: .env.production não encontrado" && exit 1
            [ ! -d .next ] && echo "ERRO: .next não encontrado" && exit 1
            [ ! -f next.config.mjs ] && echo "ERRO: next.config.mjs não encontrado" && exit 1

            # Criar diretório de logs
            mkdir -p logs

            # Instalar dependências de produção
            npm ci --omit=dev --no-audit

            # Iniciar aplicação
            pm2 start ecosystem.config.js --env production
            pm2 save

            # Aguardar e verificar
            sleep 5
            curl -f http://localhost:3000 || exit 1

            echo "Deploy concluído com sucesso!"
            pm2 status
