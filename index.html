<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Obter Token de Acesso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 40px; }
    .container { max-width: 400px; margin: auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
    button { background: #FFCF78; color: #333; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 16px; }
    button:hover { background: #F2B84D; }
    .token { margin-top: 24px; word-break: break-all; background: #f5f5f5; padding: 12px; border-radius: 6px; font-size: 0.95rem; }
    label, input { display: block; width: 100%; margin-bottom: 10px; }
    input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Obter Token de Acesso</h2>
    <label>Email:</label>
    <input type="email" id="email" value="vini@buffs.com" />
    <label>Senha:</label>
    <input type="password" id="password" value="123456" />
    <label>URL da API:</label>
    <input type="text" id="apiurl" value="http://localhost:3001" />
    <button onclick="getToken()">Obter Token</button>
    <div id="result" class="token"></div>
  </div>
  <script>
    async function getToken() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const apiurl = document.getElementById('apiurl').value;
      document.getElementById('result').textContent = 'Buscando token...';
      try {
        const res = await fetch(apiurl + '/auth/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        if (!res.ok) throw new Error('Erro ao obter token');
        const data = await res.json();
        const token = data.access_token || JSON.stringify(data);
        document.getElementById('result').textContent = token;
        // Copia para área de transferência
        if (navigator.clipboard) {
          await navigator.clipboard.writeText(token);
        } else {
          // Fallback para navegadores antigos
          const tempInput = document.createElement('input');
          tempInput.value = token;
          document.body.appendChild(tempInput);
          tempInput.select();
          document.execCommand('copy');
          document.body.removeChild(tempInput);
        }
        document.getElementById('result').textContent += '\n(Token copiado!)';
      } catch (err) {
        document.getElementById('result').textContent = 'Erro: ' + err.message;
      }
    }
  </script>
</body>
</html>
